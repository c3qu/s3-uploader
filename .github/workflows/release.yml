name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get install -y musl-tools

      - name: Install aarch64 cross-compiler
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Install UPX (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y upx

      - name: Install UPX (macOS)
        if: runner.os == 'macOS'
        run: brew install upx

      - name: Install UPX (Windows)
        if: runner.os == 'Windows'
        run: choco install upx -y

      - name: UPX compress
        run: upx --best --lzma --force-macos target/${{ matrix.target }}/release/s3-uploader${{ runner.os == 'Windows' && '.exe' || '' }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd "target/${{ matrix.target }}/release"
          tar czf "../../../s3-uploader-${{ matrix.target }}.tar.gz" s3-uploader
          cd ../../..
          sha256sum "s3-uploader-${{ matrix.target }}.tar.gz" > "s3-uploader-${{ matrix.target }}.tar.gz.sha256"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd "target/${{ matrix.target }}/release"
          7z a -tzip "../../../s3-uploader-${{ matrix.target }}.zip" s3-uploader.exe
          cd ../../..
          $hash = (Get-FileHash "s3-uploader-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  s3-uploader-${{ matrix.target }}.zip" | Out-File "s3-uploader-${{ matrix.target }}.zip.sha256" -Encoding ascii

      - uses: actions/upload-artifact@v4
        if: runner.os != 'Windows'
        with:
          name: binaries-${{ matrix.target }}
          path: |
            s3-uploader-${{ matrix.target }}.tar.gz
            s3-uploader-${{ matrix.target }}.tar.gz.sha256

      - uses: actions/upload-artifact@v4
        if: runner.os == 'Windows'
        with:
          name: binaries-${{ matrix.target }}
          path: |
            s3-uploader-${{ matrix.target }}.zip
            s3-uploader-${{ matrix.target }}.zip.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          path: artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
